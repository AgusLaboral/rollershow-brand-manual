    <linearGradient id="scrim" x1="0" y1="1" x2="0" y2="0"><stop stop-color="#1C1816" stop-opacity=".84"/><stop offset=".58" stop-color="#1C1816" stop-opacity=".08"/><stop offset="1" stop-color="#1C1816" stop-opacity="0"/></linearGradient>
