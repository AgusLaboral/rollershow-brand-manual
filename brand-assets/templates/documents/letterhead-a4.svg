    <text x="195" y="23" text-anchor="end" font-family="Manrope, sans-serif" font-size="2.8" font-style="italic" fill="#5F554D">Tipo de documento</text>
    <path d="M15 28H195" stroke="#1C1816" stroke-width=".25"/>
    <text x="15" y="49" font-family="Bricolage Grotesque, sans-serif" font-size="6.35" font-weight="800" fill="#1C1816">Título del documento</text>
    <text x="15" y="62" font-family="Manrope, sans-serif" font-size="3.53" fill="#1C1816"><tspan x="15">Cuerpo Manrope 10/15 pt. Ancho máximo 145 mm.</tspan><tspan x="15" dy="5.3">El texto queda alineado a la izquierda y conserva una lectura amplia.</tspan></text>
    <path d="M15 276H195" stroke="#E4DCCE" stroke-width=".25"/>
