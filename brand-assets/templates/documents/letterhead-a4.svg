    <text x="195" y="282" text-anchor="end" font-family="Manrope, sans-serif" font-size="2.65" fill="#87796D">0800 220 4010</text>
  </g>
  <g id="guias" fill="none" stroke="#C63A21" stroke-width=".25" stroke-dasharray="2 1.5">
    <rect x="15" y="20" width="180" height="262"/>
    <path d="M15 16V24M195 16V24M11 20H19M191 282H199"/>
  </g>
  <g id="cotas" font-family="Manrope, sans-serif" font-size="2.5" font-weight="700" fill="#C63A21">
